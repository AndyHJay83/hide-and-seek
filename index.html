<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>HIDE & SEEK</title>
  <meta name="theme-color" content="#000000">
  <link rel="manifest" href="./manifest.json">
  <style>
    :root {
      --black: #000;
      --surface: #111;
      --surface-2: #1a1a1a;
      --border: rgba(255,255,255,0.09);
      --border-mid: rgba(255,255,255,0.28);
      --border-bright: rgba(255,255,255,0.7);
      --white: #fff;
      --muted: rgba(255,255,255,0.42);
      --dim: rgba(255,255,255,0.18);
      --glow-xs: 0 0 10px rgba(255,255,255,0.15);
      --glow-sm: 0 0 22px rgba(255,255,255,0.25);
      --glow-md: 0 0 42px rgba(255,255,255,0.35);
      --glow-lg: 0 0 80px rgba(255,255,255,0.45);
      --r: 14px;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      min-height: 100dvh;
      background: var(--black);
      color: var(--white);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    }
    body {
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }
    .app {
      min-height: 100vh;
      min-height: 100dvh;
      padding: 24px 18px 24px;
      max-width: 520px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .logo {
      text-align: center;
      font-size: clamp(28px, 7vw, 40px);
      letter-spacing: 0.18em;
      font-weight: 900;
      text-shadow: var(--glow-sm);
      margin: 20px 0 12px;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 16px;
      box-shadow: var(--glow-xs);
    }
    .muted { color: var(--muted); }
    .tiny { font-size: 12px; color: var(--dim); }
    .center { text-align: center; }
    h2, p { margin: 0; }
    h2 { font-size: 18px; letter-spacing: 0.03em; }
    .stack { display: flex; flex-direction: column; gap: 12px; }
    .spacer { height: 8px; }
    label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--border-mid);
      background: #0a0a0a;
      color: var(--white);
      padding: 14px 12px;
      font-size: 16px;
      outline: none;
      text-transform: uppercase;
    }
    input[type="email"] { text-transform: none; }
    input:focus {
      border-color: var(--border-bright);
      box-shadow: var(--glow-xs);
    }
    .btn-row { display: flex; flex-wrap: wrap; gap: 10px; }
    button {
      border: 0;
      font-size: 15px;
      letter-spacing: 0.04em;
      padding: 13px 16px;
      border-radius: 12px;
      cursor: pointer;
      min-height: 44px;
      transition: all .15s ease;
    }
    button:disabled { opacity: .55; cursor: not-allowed; }
    .btn-primary { background: #fff; color: #000; box-shadow: var(--glow-sm); font-weight: 700; }
    .btn-outline { background: transparent; color: #fff; border: 1px solid var(--border-mid); }
    .btn-full { width: 100%; }
    .action-tile {
      display: block;
      width: 100%;
      text-align: center;
      border-radius: 14px;
      border: 1px solid var(--border-mid);
      background: var(--surface);
      color: #fff;
      padding: 28px 24px;
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 0.08em;
      box-shadow: var(--glow-xs);
    }
    .action-tile:active, .action-tile:hover { border-color: var(--border-bright); box-shadow: var(--glow-sm); }
    .otp-wrap {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 8px;
    }
    .otp-cell {
      width: 100%;
      height: 58px;
      text-align: center;
      font-size: 28px;
      border-radius: 12px;
      border: 1px solid var(--border-mid);
      background: #0a0a0a;
      color: #fff;
      padding: 0;
    }
    .session-bar {
      border: 1px solid var(--border-mid);
      background: var(--surface-2);
      border-radius: 12px;
      padding: 11px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      font-size: 13px;
    }
    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      letter-spacing: 0.06em;
      color: var(--muted);
    }
    .error {
      color: #fff;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.24);
      border-radius: 10px;
      padding: 10px;
      display: none;
      font-size: 13px;
    }
    .settings-link {
      margin-left: auto;
      width: 38px;
      height: 38px;
      border-radius: 999px;
      border: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      color: #fff;
      font-size: 20px;
      line-height: 1;
      padding: 0;
    }

    .status-dot {
      width: 14px;
      height: 14px;
      border-radius: 999px;
      margin-right: 10px;
      flex: 0 0 auto;
    }

    .status-dot.on {
      background: #31ff70;
      box-shadow: 0 0 16px rgba(49,255,112,0.85);
    }

    .status-dot.off {
      background: #ff4545;
      box-shadow: 0 0 16px rgba(255,69,69,0.8);
    }
    .code-chip {
      display: inline-block;
      margin: 0 auto;
      border: 1px solid var(--border-mid);
      border-radius: 999px;
      padding: 8px 14px;
      letter-spacing: 0.16em;
      font-weight: 700;
      font-size: 14px;
      background: var(--surface-2);
    }
    .status-inline {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: 6px;
    }
    .status-inline .status-dot {
      margin: 0;
      width: 16px;
      height: 16px;
    }
    .delay-wrap {
      border: 1px solid var(--border-mid);
      border-radius: 12px;
      padding: 12px;
      background: var(--surface-2);
    }
    .delay-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: 13px;
      color: var(--muted);
    }
    .delay-slider {
      width: 100%;
    }
    .active-toggle {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 0.06em;
    }
    .switch {
      position: relative;
      width: 56px;
      height: 32px;
      border-radius: 999px;
      border: 1px solid var(--border-mid);
      background: var(--surface-2);
      cursor: pointer;
    }
    .switch::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: 24px;
      height: 24px;
      border-radius: 999px;
      background: #fff;
      transition: transform .2s ease;
    }
    .switch.on {
      background: rgba(49,255,112,0.2);
      border-color: rgba(49,255,112,0.7);
    }
    .switch.on::after {
      transform: translateX(24px);
    }
    .timer-center {
      text-align: center;
      font-size: 34px;
      font-weight: 800;
      letter-spacing: 0.08em;
      margin-top: 4px;
      text-shadow: var(--glow-sm);
    }
    .btn-row.equal > button {
      flex: 1 1 0;
      width: 50%;
    }
    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(env(safe-area-inset-bottom) + 20px);
      transform: translateX(-50%);
      z-index: 200;
      background: rgba(255,255,255,0.94);
      color: #000;
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 12px;
      letter-spacing: 0.06em;
      box-shadow: var(--glow-sm);
    }
    .solo-screen {
      position: fixed;
      inset: 0;
      z-index: 120;
      background: #000;
      padding: 22px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      gap: 14px;
    }
    .solo-hint {
      color: var(--muted);
      font-size: 13px;
      max-width: 320px;
    }
    .qr-box {
      width: 220px;
      height: 220px;
      margin: 0 auto;
      background: #fff;
      border-radius: 10px;
      display: grid;
      place-items: center;
      padding: 10px;
    }
    .perform-screen {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: #000;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 24px;
    }
    .perform-awaiting { font-weight: 700; letter-spacing: 0.2em; color: rgba(255,255,255,0.75); animation: pulse 1.5s ease-in-out infinite; }
    .perform-num { font-size: clamp(120px, 32vw, 200px); line-height: 1; font-weight: 900; letter-spacing: 0.04em; text-shadow: var(--glow-lg); }
    .perform-sub { margin-top: 12px; color: var(--muted); font-size: 14px; }
    .perform-exit {
      position: fixed;
      top: calc(env(safe-area-inset-top) + 8px);
      left: calc(env(safe-area-inset-left) + 8px);
      background: transparent;
      color: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.12);
      padding: 5px 8px;
      border-radius: 8px;
      font-size: 11px;
      letter-spacing: 0.08em;
    }
    .perform-timer {
      position: fixed;
      right: calc(env(safe-area-inset-right) + 10px);
      bottom: calc(env(safe-area-inset-bottom) + 10px);
      color: rgba(255,255,255,0.2);
      font-size: 11px;
      letter-spacing: 0.08em;
    }
    .voice-state {
      border: 1px solid var(--border-mid);
      border-radius: 12px;
      padding: 10px;
      font-size: 13px;
      background: var(--surface-2);
    }
    .mic-live {
      color: #fff;
      text-shadow: var(--glow-sm);
      animation: pulse 1.2s infinite;
    }
    @keyframes pulse {
      0% { opacity: 0.35; }
      50% { opacity: 1; }
      100% { opacity: 0.35; }
    }
  </style>
</head>
<body>
  <div id="app" class="app"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="./config.js"></script>
  <script>
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: false }
    });
    const DEV_BYPASS_AUTH = true;
    const SUIT_NAMES = ['Spades', 'Hearts', 'Clubs', 'Diamonds'];
    const VAL_NAMES = ['Ace', 'Two', 'Three', 'Four', 'Five', 'Six', 'Seven', 'Eight', 'Nine', 'Ten', 'Jack', 'Queen', 'King'];

    function cardPos(suit, val) { return suit * 13 + val + 1; }
    function cardLabel(suit, val) { return VAL_NAMES[val] + ' of ' + SUIT_NAMES[suit]; }
    function calcDiff(ss, sv, hs, hv) { return cardPos(hs, hv) - cardPos(ss, sv); }
    function isValidPublicCode(v) { return /^[A-Z0-9]{6}$/.test(v); }

    const S = {
      view: 'welcome', user: null, email: '',
      regCode: '', regEmail: '', regPublicCode: '',
      loginEmail: '', publicCode: '', isActive: true,
      session: null, sessionChannel: null, sessionPoll: null, performResult: null,
      voice: {
        rec: null,
        listening: false,
        status: 'Idle',
        transcript: '',
        parsed: null,
        result: null,
        startTrigger: 'okay',
        endTrigger: 'amazing'
      },
      soloDelaySec: 0,
      soloCountdownIntv: null,
      soloStartTimer: null
    };

    function el(id) { return document.getElementById(id); }
    function setText(id, text) { const n = el(id); if (n) n.textContent = text; }
    function showError(msg) { const n = el('error-box'); if (n) { n.style.display = 'block'; n.textContent = msg; } }
    function clearError() { const n = el('error-box'); if (n) { n.style.display = 'none'; n.textContent = ''; } }
    function setBtn(btn, loading, label) {
      if (!btn) return;
      if (!btn.dataset.label) btn.dataset.label = btn.textContent;
      btn.disabled = !!loading;
      btn.textContent = loading ? (label || 'Please wait...') : btn.dataset.label;
    }
    function formatCountdown(ms) {
      const sec = Math.max(0, Math.floor(ms / 1000));
      const m = String(Math.floor(sec / 60)).padStart(2, '0');
      const s = String(sec % 60).padStart(2, '0');
      return m + ':' + s;
    }
    function stopVoice() {
      if (S.voice.rec) {
        S.voice.rec.onend = null;
        S.voice.rec.onerror = null;
        S.voice.rec.onresult = null;
        S.voice.rec.stop();
        S.voice.rec = null;
      }
      S.voice.listening = false;
      if (S.soloCountdownIntv) { clearInterval(S.soloCountdownIntv); S.soloCountdownIntv = null; }
      if (S.soloStartTimer) { clearTimeout(S.soloStartTimer); S.soloStartTimer = null; }
    }
    function clearSessionWatchers() {
      if (S.sessionChannel) { sb.removeChannel(S.sessionChannel); S.sessionChannel = null; }
      if (S.sessionPoll) { clearInterval(S.sessionPoll); S.sessionPoll = null; }
    }
    function showToast(msg) {
      const old = el('toast');
      if (old) old.remove();
      const n = document.createElement('div');
      n.id = 'toast';
      n.className = 'toast';
      n.textContent = msg;
      document.body.appendChild(n);
      setTimeout(() => { if (n.parentNode) n.parentNode.removeChild(n); }, 1300);
    }
    function go(view) {
      clearSessionWatchers();
      stopVoice();
      S.view = view;
      render();
    }

    async function getSession() { const { data } = await sb.auth.getSession(); return data.session || null; }
    async function hasProfile(email) {
      const { data, error } = await sb.from('profiles').select('id').eq('email', email.toLowerCase()).maybeSingle();
      if (error) throw error; return !!data;
    }
    async function hasPublicCode(code) {
      const { data, error } = await sb.from('profiles').select('id').eq('public_code', code).maybeSingle();
      if (error && error.code !== 'PGRST116') throw error;
      return !!data;
    }
    async function validateCode(code) {
      const c = code.toUpperCase().trim();
      const { data, error } = await sb.from('purchase_codes').select('code,redeemed').eq('code', c).maybeSingle();
      if (error) throw error; return data && data.redeemed === false;
    }
    async function redeemCode(code) {
      const { error } = await sb.from('purchase_codes').update({
        redeemed: true, redeemed_by: S.user.id, redeemed_at: new Date().toISOString()
      }).eq('code', code.toUpperCase().trim()).eq('redeemed', false);
      if (error) throw error;
    }
    async function createProfile() {
      const payload = { id: S.user.id, email: S.user.email.toLowerCase(), public_code: S.regPublicCode, is_active: true };
      const { error } = await sb.from('profiles').insert(payload);
      if (error) throw error;
    }
    async function loadProfile() {
      if (!S.user) return;
      const { data, error } = await sb.from('profiles').select('email, public_code, is_active').eq('id', S.user.id).maybeSingle();
      if (error) throw error;
      if (data) {
        S.email = data.email || S.user.email || '';
        S.publicCode = data.public_code || '';
        S.isActive = data.is_active !== false;
      }
    }
    async function ensureBypassProfile() {
      const existing = await sb.from('profiles').select('id, email, public_code, is_active').eq('id', S.user.id).maybeSingle();
      if (existing.error && existing.error.code !== 'PGRST116') throw existing.error;
      if (existing.data) {
        S.email = existing.data.email || S.user.email || 'guest@hideandseek.app';
        S.publicCode = existing.data.public_code || '';
        S.isActive = existing.data.is_active !== false;
        return;
      }
      const code = (S.user.id || '').replace(/-/g, '').slice(0, 6).toUpperCase() || 'HIDE01';
      const email = 'guest-' + (S.user.id || Date.now()) + '@hideandseek.app';
      const ins = await sb.from('profiles').insert({
        id: S.user.id,
        email: email,
        public_code: code,
        is_active: true
      });
      if (ins.error) throw ins.error;
      S.email = email;
      S.publicCode = code;
      S.isActive = true;
    }
    async function setProfileActive(nextActive) {
      const { error } = await sb.from('profiles').update({ is_active: nextActive }).eq('id', S.user.id);
      if (error) throw error;
      S.isActive = nextActive;
    }
    function sessionAge() { if (!S.session) return null; return Date.now() - new Date(S.session.created_at).getTime(); }
    function sessionRemaining() { const age = sessionAge(); if (age == null) return 0; return Math.max(0, 30 * 60 * 1000 - age); }
    async function loadActiveSession() {
      if (!S.user) return null;
      const { data, error } = await sb.from('sessions').select('*').eq('performer_id', S.user.id).eq('expired', false).order('created_at', { ascending: false }).limit(1).maybeSingle();
      if (error) throw error;
      if (!data) return null;
      if (Date.now() - new Date(data.created_at).getTime() > 30 * 60 * 1000) {
        await sb.from('sessions').update({ expired: true }).eq('id', data.id);
        return null;
      }
      return data;
    }
    async function createNewSession() {
      if (!S.user) throw new Error('Not authenticated.');
      if (!S.isActive) throw new Error('Activate account to generate session links.');
      await sb.from('sessions').update({ expired: true }).eq('performer_id', S.user.id).eq('expired', false);
      const { data, error } = await sb.from('sessions').insert({ performer_id: S.user.id }).select('*').single();
      if (error) throw error;
      S.session = data;
      S.performResult = null;
      return data;
    }

    function initOtpInputs(onComplete) {
      const cells = [0,1,2,3,4,5].map((i) => el('otp-' + i));
      cells.forEach((input, idx) => {
        if (!input) return;
        input.addEventListener('input', () => {
          input.value = (input.value || '').replace(/\D/g, '').slice(0, 1);
          if (input.value && idx < 5) cells[idx + 1].focus();
          const code = cells.map((c) => c.value).join('');
          if (code.length === 6) onComplete(code);
        });
        input.addEventListener('keydown', (e) => { if (e.key === 'Backspace' && !input.value && idx > 0) cells[idx - 1].focus(); });
        input.addEventListener('paste', (e) => {
          const txt = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '').slice(0, 6);
          if (!txt) return;
          e.preventDefault();
          txt.split('').forEach((ch, i) => { if (cells[i]) cells[i].value = ch; });
          if (txt.length === 6) onComplete(txt);
        });
      });
      if (cells[0]) cells[0].focus();
    }

    function parseVoiceCards(raw, startTrigger, endTrigger) {
      const text = (raw || '').toLowerCase().replace(/[^a-z0-9\s]/g, ' ').replace(/\s+/g, ' ').trim();
      const normalizedStart = (startTrigger || 'okay').toLowerCase().trim();
      const normalizedEnd = (endTrigger || 'amazing').toLowerCase().trim();
      const startIdx = normalizedStart ? text.indexOf(normalizedStart) : -1;
      const endIdx = normalizedEnd ? text.lastIndexOf(normalizedEnd) : -1;
      const startOffset = startIdx >= 0 ? normalizedStart.length : 0;
      const windowText = (startIdx >= 0 && endIdx > startIdx)
        ? text.slice(startIdx + startOffset, endIdx).trim()
        : text;
      const tokens = windowText.split(' ');
      const valMap = { ace: 0, one: 0, a: 0, two: 1, to: 1, too: 1, three: 2, four: 3, for: 3, five: 4, six: 5, seven: 6, eight: 7, ate: 7, nine: 8, ten: 9, jack: 10, queen: 11, king: 12, j: 10, q: 11, k: 12 };
      const suitMap = { spade: 0, spades: 0, heart: 1, hearts: 1, club: 2, clubs: 2, diamond: 3, diamonds: 3 };
      const cards = [];
      for (let i = 0; i < tokens.length; i++) {
        const t = tokens[i];
        const value = /^\d+$/.test(t) ? (Number(t) === 1 ? 0 : Number(t) - 1) : valMap[t];
        if (value == null || value < 0 || value > 12) continue;
        let suit = null;
        for (let j = i + 1; j <= Math.min(i + 3, tokens.length - 1); j++) { if (suitMap[tokens[j]] != null) { suit = suitMap[tokens[j]]; break; } }
        if (suit == null) for (let j = Math.max(0, i - 2); j < i; j++) { if (suitMap[tokens[j]] != null) { suit = suitMap[tokens[j]]; break; } }
        if (suit != null) cards.push({ value, suit, idx: i });
      }
      if (cards.length < 2) return { error: 'Could not detect two cards clearly.' };
      let seeker = null;
      let hider = null;
      for (let i = 0; i < cards.length; i++) {
        const c = cards[i];
        const ctx = tokens.slice(Math.max(0, c.idx - 6), Math.min(tokens.length, c.idx + 7)).join(' ');
        if (!seeker && ctx.includes('seeker')) seeker = c;
        if (!hider && ctx.includes('hider')) hider = c;
      }
      if (!seeker && !hider) { seeker = cards[0]; hider = cards[1]; }
      else if (!seeker) seeker = cards.find((c) => c !== hider) || cards[0];
      else if (!hider) hider = cards.find((c) => c !== seeker) || cards[1];
      return {
        transcript: windowText,
        seeker: { suit: seeker.suit, value: seeker.value },
        hider: { suit: hider.suit, value: hider.value }
      };
    }

    function viewWelcome() {
      return '<div class="logo">HIDE & SEEK</div><div class="panel stack"><h2 class="center">Performance Transmission Tool</h2><p class="muted center">Install this as a PWA for best results.</p><div class="spacer"></div><button id="go-login" class="btn-primary btn-full">LOGIN</button><button id="go-reg" class="btn-outline btn-full">CREATE ACCOUNT</button></div><div id="error-box" class="error"></div>';
    }
    function bindWelcome() { el('go-login').onclick = () => go('login-email'); el('go-reg').onclick = () => go('reg-code'); }

    function viewLoginEmail() {

      if (error || !data) return;
      S.session = data;

    function bindPerform() {
      const b = el('perform-back'); if (b) b.onclick = () => go('home');
      const exit = el('perform-exit'); if (exit) exit.onclick = () => go('home');
      const screen = document.querySelector('.perform-screen');
      if (screen) screen.ondblclick = () => go('home');
      if (!S.session) return;
      const timerIntv = setInterval(() => {
        const t = el('perform-timer'); if (!t) return clearInterval(timerIntv);
        const rem = sessionRemaining(); t.textContent = formatCountdown(rem);
        if (rem <= 0) { clearInterval(timerIntv); clearSessionWatchers(); S.session = null; S.performResult = null; go('home'); }
      }, 1000);
      S.sessionChannel = sb.channel('perform-' + S.session.id).on('postgres_changes', {
        event: 'UPDATE', schema: 'public', table: 'sessions', filter: 'id=eq.' + S.session.id
      }, (payload) => {
        const data = payload.new;
        S.session = data;
        if (data.submitted_at && data.seeker_suit != null && data.hider_suit != null) {
          S.performResult = data;
          showPerformResult(data);
        }
      }).subscribe();
      S.sessionPoll = setInterval(checkSessionForResult, 5000);
      checkSessionForResult();
    }

    function voiceResultMarkup(result) {
      if (!result || !result.parsed) return '';
      const diff = result.diff > 0 ? '+' + result.diff : String(result.diff);
      return '<div style="margin-top:6px;"><div class="perform-num" style="font-size:clamp(84px,22vw,150px);text-align:center;">' + diff + '</div><div class="perform-sub" style="text-align:center;">' + cardLabel(result.parsed.seeker.suit, result.parsed.seeker.value) + '</div><div class="perform-sub" style="text-align:center;">' + cardLabel(result.parsed.hider.suit, result.parsed.hider.value) + '</div></div>';

      return '<div class="solo-screen"><button id="solo-back" class="perform-exit">EXIT</button><div id="solo-main"><div class="perform-awaiting">SOLO READY</div></div><div id="solo-status" class="solo-hint"></div></div><div id="error-box" class="error"></div>';
    }
    function startSoloListening() {
      if (S.voice.listening) return;
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) {
        showError('Speech recognition is not supported in this browser.');
        return;
      }
      S.voice.parsed = null;
      S.voice.result = null;
      S.voice.transcript = '';
      const rec = new SR();
      rec.lang = 'en-US';
      rec.continuous = true;
      rec.interimResults = true;
      S.voice.rec = rec;
      S.voice.listening = true;
      setText('solo-status', 'Listening...');
      rec.onresult = (event) => {
        let full = '';
        for (let i = 0; i < event.results.length; i++) full += event.results[i][0].transcript + ' ';
        S.voice.transcript = full.trim();
        const heardEndTrigger = S.voice.transcript.toLowerCase().includes(S.voice.endTrigger);
        if (!heardEndTrigger) return;
        const parsed = parseVoiceCards(S.voice.transcript, S.voice.startTrigger, S.voice.endTrigger);
        stopVoice();
        if (parsed.error) {
          setText('solo-status', parsed.error);
          return;
        }
        const diff = calcDiff(parsed.seeker.suit, parsed.seeker.value, parsed.hider.suit, parsed.hider.value);
        const signed = diff > 0 ? '+' + diff : String(diff);
        const main = el('solo-main');
        if (main) {
          main.innerHTML = '<div class="perform-num">' + signed + '</div><div class="perform-sub">' + cardLabel(parsed.seeker.suit, parsed.seeker.value) + '</div><div class="perform-sub">' + cardLabel(parsed.hider.suit, parsed.hider.value) + '</div>';
        }
        setText('solo-status', 'Captured.');
      };
      rec.onerror = () => { S.voice.listening = false; setText('solo-status', 'Voice error'); };
      rec.onend = () => {
        const wasListening = S.voice.listening;
        S.voice.listening = false;
        if (wasListening && S.soloDelaySec === 0) setText('solo-status', 'Double tap lower half to start/stop');
      };
      rec.start();
    }
    function bindSoloPerform() {
      const back = el('solo-back');
      if (back) back.onclick = () => go('home');
      const screen = document.querySelector('.solo-screen');
      if (screen) {
        screen.ondblclick = (e) => {
          if (e.clientY < window.innerHeight / 2) return;
          if (S.soloDelaySec === 0) {
            if (S.voice.listening) {
              stopVoice();
              setText('solo-status', 'Stopped');
            } else {
              startSoloListening();
            }
          }
        };
      }
      if (S.soloDelaySec > 0) {
        let remaining = S.soloDelaySec;
        setText('solo-status', 'Listening starts in ' + remaining + 's');
        S.soloCountdownIntv = setInterval(() => {
          remaining -= 1;
          if (remaining <= 0) {
            clearInterval(S.soloCountdownIntv);
            S.soloCountdownIntv = null;
            startSoloListening();
          } else {
            setText('solo-status', 'Listening starts in ' + remaining + 's');
          }
        }, 1000);
      } else {
        setText('solo-status', 'Double tap lower half to start/stop');
      }
    }
    function viewVoice() {
      const parsed = S.voice.parsed;
      return '<div class="logo">HIDE & SEEK</div><div class="panel stack"><h2>Voice Mode</h2><p class="muted">Set your own trigger phrases. Listening auto-stops when end trigger is heard.</p><div class="voice-state"><strong>Status:</strong> <span class="' + (S.voice.listening ? 'mic-live' : '') + '">' + S.voice.status + '</span></div><div><label>Start Trigger</label><input id="voice-start-trigger" type="text" value="' + (S.voice.startTrigger || 'okay') + '"></div><div><label>End Trigger</label><input id="voice-end-trigger" type="text" value="' + (S.voice.endTrigger || 'amazing') + '"></div>' + (parsed ? voiceResultMarkup(S.voice.result) : '') + '<div class="btn-row"><button id="voice-start" class="btn-primary">Start Listening</button></div><button id="voice-back" class="btn-outline btn-full">Back Home</button></div><div id="error-box" class="error"></div>';
    }
    function bindVoice() {
      el('voice-back').onclick = () => go('home');
      el('voice-start').onclick = () => {
        clearError();
        S.voice.startTrigger = (el('voice-start-trigger').value || 'okay').trim().toLowerCase();
        S.voice.endTrigger = (el('voice-end-trigger').value || 'amazing').trim().toLowerCase();
        if (!S.voice.startTrigger || !S.voice.endTrigger) {
          showError('Please provide both start and end trigger phrases.');
          return;
        }
        S.voice.transcript = '';
        S.voice.parsed = null;
        S.voice.result = null;
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) { showError('Speech recognition is not supported in this browser.'); return; }
        stopVoice();
        const rec = new SR();
        rec.lang = 'en-US';
        rec.continuous = true;
        rec.interimResults = true;
        S.voice.rec = rec;
        S.voice.listening = true;
        S.voice.status = 'Mic active and listening...';
        rec.onresult = (event) => {
          let full = '';
          for (let i = 0; i < event.results.length; i++) full += event.results[i][0].transcript + ' ';
          S.voice.transcript = full.trim();
          const heardEndTrigger = S.voice.transcript.toLowerCase().includes(S.voice.endTrigger);
          if (!heardEndTrigger) {
            S.voice.status = 'Mic active and listening...';
            render();
            return;
          }
          S.voice.status = 'End trigger heard. Processing...';
          const parsed = parseVoiceCards(S.voice.transcript, S.voice.startTrigger, S.voice.endTrigger);
          stopVoice();
          if (!parsed.error) {
            S.voice.status = 'Transmission captured.';
            S.voice.parsed = parsed;
            const d = calcDiff(parsed.seeker.suit, parsed.seeker.value, parsed.hider.suit, parsed.hider.value);
            S.voice.result = { diff: d, parsed: parsed };
          } else {
            S.voice.status = parsed.error;
          }
          render();
        };
        rec.onerror = () => { S.voice.status = 'Voice error'; S.voice.listening = false; render(); };
        rec.onend = () => { S.voice.listening = false; if (!S.voice.parsed) S.voice.status = 'Listening ended'; render(); };
        rec.start();
        render();
      };
    }

    async function render() {
      const app = el('app'); if (!app) return;
      if (S.view === 'welcome') { app.innerHTML = viewWelcome(); bindWelcome(); return; }
      if (S.view === 'login-email') { app.innerHTML = viewLoginEmail(); bindLoginEmail(); return; }
      if (S.view === 'login-otp') { app.innerHTML = viewLoginOtp(); bindLoginOtp(); return; }
      if (S.view === 'reg-code') { app.innerHTML = viewRegCode(); bindRegCode(); return; }
      if (S.view === 'reg-email') { app.innerHTML = viewRegEmail(); bindRegEmail(); return; }
      if (S.view === 'reg-otp') { app.innerHTML = viewRegOtp(); bindRegOtp(); return; }
      if (S.view === 'home') { app.innerHTML = viewHome(); bindHome(); return; }
      if (S.view === 'accomplice-send') { app.innerHTML = viewAccompliceSend(); await bindAccompliceSend(); return; }
      if (S.view === 'perform') { app.innerHTML = viewPerform(); bindPerform(); return; }
      if (S.view === 'solo-perform') { app.innerHTML = viewSoloPerform(); bindSoloPerform(); return; }
      if (S.view === 'voice') { app.innerHTML = viewVoice(); bindVoice(); return; }
      if (S.view === 'settings') { app.innerHTML = viewSettings(); bindSettings(); }
    }
    async function init() {
      if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(() => {});
      if (DEV_BYPASS_AUTH) {
        let session = await getSession();
        if (!session || !session.user) {
          const anon = await sb.auth.signInAnonymously();
          if (anon.error) {
            S.view = 'welcome';
            render();
            showError('Anonymous auth failed. Enable Anonymous provider in Supabase Auth settings.');
            return;
          }
          session = anon.data.session || null;
        }
        if (session && session.user) {
          S.user = session.user;
          try {
            await ensureBypassProfile();
          } catch (_) {
            S.email = 'guest@hideandseek.app';
          }
          try { S.session = await loadActiveSession(); } catch (_) {}
          S.view = 'home';
          render();
          return;
        }
      }

      const session = await getSession();
      if (session && session.user) {
        S.user = session.user;
        try { await loadProfile(); } catch (_) { S.email = session.user.email || ''; }
        try { S.session = await loadActiveSession(); } catch (_) {}
        S.view = 'home';
      }
      render();
    }
    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
