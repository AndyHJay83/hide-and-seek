<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>HIDE & SEEK</title>
  <meta name="theme-color" content="#000000">
  <link rel="manifest" href="./manifest.json">
  <style>
    :root {
      --black: #000;
      --surface: #111;
      --surface-2: #1a1a1a;
      --border: rgba(255,255,255,0.09);
      --border-mid: rgba(255,255,255,0.28);
      --border-bright: rgba(255,255,255,0.7);
      --white: #fff;
      --muted: rgba(255,255,255,0.42);
      --dim: rgba(255,255,255,0.18);
      --glow-xs: 0 0 10px rgba(255,255,255,0.15);
      --glow-sm: 0 0 22px rgba(255,255,255,0.25);
      --glow-md: 0 0 42px rgba(255,255,255,0.35);
      --glow-lg: 0 0 80px rgba(255,255,255,0.45);
      --r: 14px;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      min-height: 100dvh;
      background: var(--black);
      color: var(--white);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    }
    body {
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }
    .app {
      min-height: 100vh;
      min-height: 100dvh;
      padding: 24px 18px 24px;
      max-width: 520px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .logo {
      text-align: center;
      font-size: clamp(28px, 7vw, 40px);
      letter-spacing: 0.18em;
      font-weight: 900;
      text-shadow: var(--glow-sm);
      margin: 20px 0 12px;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 16px;
      box-shadow: var(--glow-xs);
    }
    .muted { color: var(--muted); }
    .tiny { font-size: 12px; color: var(--dim); }
    .center { text-align: center; }
    h2, p { margin: 0; }
    h2 { font-size: 18px; letter-spacing: 0.03em; }
    .stack { display: flex; flex-direction: column; gap: 12px; }
    .spacer { height: 8px; }
    label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--border-mid);
      background: #0a0a0a;
      color: var(--white);
      padding: 14px 12px;
      font-size: 16px;
      outline: none;
      text-transform: uppercase;
    }
    input[type="email"] { text-transform: none; }
    input:focus {
      border-color: var(--border-bright);
      box-shadow: var(--glow-xs);
    }
    .btn-row { display: flex; flex-wrap: wrap; gap: 10px; }
    button {
      border: 0;
      font-size: 15px;
      letter-spacing: 0.04em;
      padding: 13px 16px;
      border-radius: 12px;
      cursor: pointer;
      min-height: 44px;
      transition: all .15s ease;
    }
    button:disabled { opacity: .55; cursor: not-allowed; }
    .btn-primary { background: #fff; color: #000; box-shadow: var(--glow-sm); font-weight: 700; }
    .btn-outline { background: transparent; color: #fff; border: 1px solid var(--border-mid); }
    .btn-danger {
      background: #ff3a3a;
      color: #000;
      border: 1px solid rgba(255,255,255,0.15);
      box-shadow: 0 0 18px rgba(255,58,58,0.38);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .input-method-select {
      width: 30%;
      min-width: 132px;
      margin: 0 auto;
      display: block;
      min-height: 40px;
      height: 40px;
      border-radius: 999px;
      background: #0a0a0a;
      color: #fff;
      border: 1px solid rgba(151, 204, 255, 0.72);
      box-shadow: 0 0 0 1px rgba(127, 188, 255, 0.16), 0 0 18px rgba(122, 190, 255, 0.3);
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-align: center;
      text-align-last: center;
      padding: 6px 14px;
      outline: none;
      text-transform: uppercase;
    }
    .input-method-select:focus {
      border-color: rgba(171, 219, 255, 0.95);
      box-shadow: 0 0 0 1px rgba(171, 219, 255, 0.3), 0 0 20px rgba(141, 205, 255, 0.42);
    }
    .input-method-label {
      display: block;
      text-align: center;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0.08em;
      color: #fff;
      margin-bottom: 8px;
      text-transform: uppercase;
    }
    .btn-full { width: 100%; }
    .action-tile {
      display: block;
      width: 100%;
      text-align: center;
      border-radius: 14px;
      border: 1px solid var(--border-mid);
      background: var(--surface);
      color: #fff;
      padding: 28px 24px;
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 0.08em;
      box-shadow: var(--glow-xs);
    }
    .action-tile:active, .action-tile:hover { border-color: var(--border-bright); box-shadow: var(--glow-sm); }
    .otp-wrap {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 8px;
    }
    .otp-cell {
      width: 100%;
      height: 58px;
      text-align: center;
      font-size: 28px;
      border-radius: 12px;
      border: 1px solid var(--border-mid);
      background: #0a0a0a;
      color: #fff;
      padding: 0;
    }
    .session-bar {
      border: 1px solid var(--border-mid);
      background: var(--surface-2);
      border-radius: 12px;
      padding: 11px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      font-size: 13px;
    }
    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      letter-spacing: 0.06em;
      color: var(--muted);
    }
    .error {
      color: #fff;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.24);
      border-radius: 10px;
      padding: 10px;
      display: none;
      font-size: 13px;
    }
    .settings-link {
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 38px;
      height: 38px;
      border-radius: 999px;
      border: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      color: #fff;
      font-size: 20px;
      line-height: 1;
      padding: 0;
    }

    .status-dot {
      width: 14px;
      height: 14px;
      border-radius: 999px;
      margin-right: 10px;
      flex: 0 0 auto;
    }

    .status-dot.on {
      background: #31ff70;
      box-shadow: 0 0 16px rgba(49,255,112,0.85);
    }

    .status-dot.off {
      background: #ff4545;
      box-shadow: 0 0 16px rgba(255,69,69,0.8);
    }
    .code-chip {
      display: inline-block;
      margin: 0 auto;
      border: 1px solid var(--border-mid);
      border-radius: 999px;
      padding: 8px 14px;
      letter-spacing: 0.16em;
      font-weight: 700;
      font-size: 14px;
      background: var(--surface-2);
    }
    .status-inline {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: 6px;
    }
    .status-inline .status-dot {
      margin: 0;
      width: 16px;
      height: 16px;
    }
    .delay-wrap {
      border: 1px solid var(--border-mid);
      border-radius: 12px;
      padding: 12px;
      background: var(--surface-2);
    }
    .delay-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: 13px;
      color: var(--muted);
    }
    .delay-picker {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 4px 2px 6px;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
    }
    .delay-picker::-webkit-scrollbar {
      height: 0;
      width: 0;
    }
    .delay-option {
      flex: 0 0 auto;
      min-width: 42px;
      height: 42px;
      border-radius: 999px;
      border: 1px solid var(--border-mid);
      background: transparent;
      color: #fff;
      font-size: 14px;
      padding: 0;
      scroll-snap-align: center;
    }
    .delay-option.sel {
      border-color: var(--border-bright);
      box-shadow: var(--glow-xs);
      background: rgba(255,255,255,0.1);
    }
    .active-toggle {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-top: 14px;
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 0.06em;
    }
    .active-label {
      color: rgba(255,255,255,0.72);
      letter-spacing: 0.12em;
      font-size: 12px;
      text-align: center;
    }
    .switch {
      position: relative;
      width: 72px;
      height: 38px;
      border-radius: 999px;
      border: 1px solid var(--border-mid);
      background: rgba(255,255,255,0.07);
      cursor: pointer;
      transition: all .2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
    }
    .switch::after {
      content: '';
      position: absolute;
      top: 4px;
      left: 4px;
      width: 28px;
      height: 28px;
      border-radius: 999px;
      background: #f7f7f7;
      box-shadow: 0 0 12px rgba(255,255,255,0.28);
      transition: transform .22s ease, background .22s ease;
    }
    .switch.on {
      background: rgba(49,255,112,0.22);
      border-color: rgba(49,255,112,0.85);
      box-shadow: 0 0 18px rgba(49,255,112,0.3);
    }
    .switch.on::after {
      transform: translateX(34px);
      background: #ffffff;
    }
    .toggle-state {
      font-size: 11px;
      letter-spacing: 0.14em;
      color: rgba(255,255,255,0.58);
      text-align: center;
      min-height: 14px;
    }
    .toggle-state.on {
      color: rgba(49,255,112,0.9);
      text-shadow: 0 0 12px rgba(49,255,112,0.45);
    }
    .home-shell {
      background: transparent;
      border: 0;
      box-shadow: none;
      padding: 0;
    }
    .inline-accomplice {
      border: 1px solid var(--border-mid);
      border-radius: 14px;
      padding: 14px;
      background: var(--surface);
      box-shadow: var(--glow-xs);
    }
    .home-header {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 48px;
    }
    .solo-btn {
      position: relative;
    }
    .solo-icon {
      position: absolute;
      right: 12px;
      top: 11px;
      width: 15px;
      height: 15px;
      opacity: 0.88;
    }
    .solo-icon svg {
      width: 100%;
      height: 100%;
      display: block;
      fill: #fff;
    }
    .timer-center {
      text-align: center;
      font-size: 34px;
      font-weight: 800;
      letter-spacing: 0.08em;
      margin-top: 4px;
      text-shadow: var(--glow-sm);
    }
    .btn-row.equal > button {
      flex: 1 1 0;
      width: 50%;
    }
    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(env(safe-area-inset-bottom) + 20px);
      transform: translateX(-50%);
      z-index: 200;
      background: rgba(255,255,255,0.94);
      color: #000;
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 12px;
      letter-spacing: 0.06em;
      box-shadow: var(--glow-sm);
    }
    .solo-screen {
      position: fixed;
      inset: 0;
      z-index: 120;
      background: #000;
      padding: 22px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      gap: 14px;
    }
    .solo-hint {
      color: var(--muted);
      font-size: 13px;
      max-width: 320px;
    }
    .card-chip-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-start;
      max-height: 180px;
      overflow-y: auto;
      border: 1px solid var(--border-mid);
      border-radius: 10px;
      padding: 10px;
      background: #0a0a0a;
    }
    .card-chip {
      border: 1px solid var(--border-mid);
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 13px;
      letter-spacing: 0.06em;
      color: #fff;
    }
    .card-chip.red {
      color: #ff5f5f;
      border-color: rgba(255,95,95,0.6);
      box-shadow: 0 0 8px rgba(255,95,95,0.25);
    }
    .entry-steps {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .entry-dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      border: 1px solid var(--border-mid);
      background: transparent;
    }
    .entry-dot.active {
      background: #fff;
      border-color: #fff;
      box-shadow: var(--glow-xs);
    }
    .entry-dot.done {
      background: rgba(255,255,255,0.55);
      border-color: rgba(255,255,255,0.7);
    }
    .entry-preview {
      border: 1px solid var(--border-mid);
      background: var(--surface-2);
      border-radius: 12px;
      min-height: 60px;
      padding: 10px;
      display: grid;
      place-items: center;
      margin-bottom: 12px;
      font-size: 15px;
    }
    .entry-val-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 10px;
    }
    .entry-card-btn {
      border: 1px solid var(--border-mid);
      background: transparent;
      color: #fff;
      border-radius: 10px;
      min-height: 50px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }
    .entry-card-btn.king { grid-column: span 4; }
    .entry-card-btn.sel {
      border-color: rgba(255,255,255,0.7);
      background: rgba(255,255,255,0.12);
      box-shadow: var(--glow-xs);
    }
    .entry-suit-row {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 12px;
    }
    .entry-suit-btn {
      border: 1px solid var(--border-mid);
      background: transparent;
      color: #fff;
      border-radius: 10px;
      min-height: 56px;
      cursor: pointer;
      display: grid;
      place-items: center;
      gap: 1px;
      font-size: 13px;
    }
    .entry-suit-btn span:first-child { font-size: 22px; line-height: 1; }
    .entry-suit-btn.sel {
      border-color: rgba(255,255,255,0.7);
      background: rgba(255,255,255,0.12);
      box-shadow: var(--glow-xs);
    }
    .qr-box {
      width: 220px;
      height: 220px;
      margin: 0 auto;
      background: #fff;
      border-radius: 10px;
      display: grid;
      place-items: center;
      padding: 10px;
    }
    .perform-screen {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: #000;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 24px;
    }
    .perform-awaiting { font-weight: 700; letter-spacing: 0.2em; color: rgba(255,255,255,0.75); animation: pulse 1.5s ease-in-out infinite; }
    .perform-num { font-size: clamp(120px, 32vw, 200px); line-height: 1; font-weight: 900; letter-spacing: 0.04em; text-shadow: var(--glow-lg); }
    .perform-phrase {
      font-size: clamp(26px, 7vw, 54px);
      line-height: 1.12;
      font-weight: 900;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      text-shadow: var(--glow-md);
      max-width: 900px;
      margin: 0 auto;
    }
    .perform-phrase.neg {
      color: #ff4d4d;
      text-shadow: 0 0 28px rgba(255,77,77,0.5);
    }
    .perform-sub { margin-top: 12px; color: var(--muted); font-size: 14px; }
    .perform-exit {
      position: fixed;
      top: calc(env(safe-area-inset-top) + 8px);
      left: calc(env(safe-area-inset-left) + 8px);
      background: transparent;
      color: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.12);
      padding: 5px 8px;
      border-radius: 8px;
      font-size: 11px;
      letter-spacing: 0.08em;
    }
    .perform-timer {
      position: fixed;
      right: calc(env(safe-area-inset-right) + 10px);
      bottom: calc(env(safe-area-inset-bottom) + 10px);
      color: rgba(255,255,255,0.2);
      font-size: 11px;
      letter-spacing: 0.08em;
    }
    .voice-state {
      border: 1px solid var(--border-mid);
      border-radius: 12px;
      padding: 10px;
      font-size: 13px;
      background: var(--surface-2);
    }
    .mic-live {
      color: #fff;
      text-shadow: var(--glow-sm);
      animation: pulse 1.2s infinite;
    }
    @keyframes pulse {
      0% { opacity: 0.35; }
      50% { opacity: 1; }
      100% { opacity: 0.35; }
    }
  </style>
</head>

    function initOtpInputs(onComplete) {
      const cells = [0,1,2,3,4,5].map((i) => el('otp-' + i));

        input.addEventListener('input', () => {
          input.value = (input.value || '').replace(/\D/g, '').slice(0, 1);
          if (input.value && idx < 5) cells[idx + 1].focus();
          const code = cells.map((c) => c.value).join('');
          if (code.length === 6) onComplete(code);
        });
        input.addEventListener('keydown', (e) => { if (e.key === 'Backspace' && !input.value && idx > 0) cells[idx - 1].focus(); });

          txt.split('').forEach((ch, i) => { if (cells[i]) cells[i].value = ch; });

    function parseVoiceCards(raw, startTrigger, endTrigger) {
      const text = (raw || '').toLowerCase().replace(/[^a-z0-9\s]/g, ' ').replace(/\s+/g, ' ').trim();
      const normalizedStart = (startTrigger || 'okay').toLowerCase().trim();
      const normalizedEnd = (endTrigger || 'amazing').toLowerCase().trim();
      const startIdx = normalizedStart ? text.indexOf(normalizedStart) : -1;
      const endIdx = normalizedEnd ? text.lastIndexOf(normalizedEnd) : -1;
      const startOffset = startIdx >= 0 ? normalizedStart.length : 0;
      const windowText = (startIdx >= 0 && endIdx > startIdx)
        ? text.slice(startIdx + startOffset, endIdx).trim()
        : text;
      const tokens = windowText.split(' ');
      const valMap = { ace: 0, one: 0, a: 0, two: 1, to: 1, too: 1, three: 2, four: 3, for: 3, five: 4, six: 5, seven: 6, eight: 7, ate: 7, nine: 8, ten: 9, jack: 10, queen: 11, king: 12, j: 10, q: 11, k: 12 };
      const suitMap = { spade: 0, spades: 0, heart: 1, hearts: 1, club: 2, clubs: 2, diamond: 3, diamonds: 3 };
      const cards = [];
      for (let i = 0; i < tokens.length; i++) {
        const t = tokens[i];
        const value = /^\d+$/.test(t) ? (Number(t) === 1 ? 0 : Number(t) - 1) : valMap[t];
        if (value == null || value < 0 || value > 12) continue;
        let suit = null;
        for (let j = i + 1; j <= Math.min(i + 3, tokens.length - 1); j++) { if (suitMap[tokens[j]] != null) { suit = suitMap[tokens[j]]; break; } }
        if (suit == null) for (let j = Math.max(0, i - 2); j < i; j++) { if (suitMap[tokens[j]] != null) { suit = suitMap[tokens[j]]; break; } }
        if (suit != null) cards.push({ value, suit, idx: i });
      }
      if (cards.length < 2) return { error: 'Could not detect two cards clearly.' };
      let seeker = null;
      let hider = null;
      for (let i = 0; i < cards.length; i++) {
        const c = cards[i];
        const ctx = tokens.slice(Math.max(0, c.idx - 6), Math.min(tokens.length, c.idx + 7)).join(' ');
        if (!seeker && ctx.includes('seeker')) seeker = c;
        if (!hider && ctx.includes('hider')) hider = c;
      }
      if (!seeker && !hider) { seeker = cards[0]; hider = cards[1]; }
      else if (!seeker) seeker = cards.find((c) => c !== hider) || cards[0];
      else if (!hider) hider = cards.find((c) => c !== seeker) || cards[1];
      return {
        transcript: windowText,
        seeker: { suit: seeker.suit, value: seeker.value },
        hider: { suit: hider.suit, value: hider.value }
      };
    }

    async function bindCameraStack() {
      const back = el('cam-back');
      if (back) back.onclick = () => go('settings');
      const recordBtn = el('cam-record');
      const processBtn = el('cam-process');
      const recordLeft = el('cam-record-left');
      const recordFill = el('cam-record-fill');
      try {
        S.cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
        const vid = el('cam-video');
        if (vid) vid.srcObject = S.cameraStream;
      } catch (err) {
        showError('Camera access failed. ' + (err.message || ''));
      }
      if (!supportsVideoRecorder()) {
        if (recordBtn) recordBtn.disabled = true;

        if (status) status.textContent = 'MediaRecorder unsupported in this browser. Use Chrome on Android.';
      }
      if (recordBtn) {
        recordBtn.onclick = () => {
          clearError();
          const status = el('cam-status');
          if (!S.cameraStream) return showError('Camera is not ready.');
          if (!supportsVideoRecorder()) return showError('MediaRecorder is not supported.');
          if (S.cameraRecording) return;
          S.cameraChunks = [];
          S.cameraRecording = true;
          const type = MediaRecorder.isTypeSupported('video/webm;codecs=vp8') ? 'video/webm;codecs=vp8' :
            (MediaRecorder.isTypeSupported('video/mp4') ? 'video/mp4' : '');
          S.cameraRecorder = new MediaRecorder(S.cameraStream, type ? { mimeType: type } : undefined);
          S.cameraRecorder.ondataavailable = (e) => { if (e.data && e.data.size) S.cameraChunks.push(e.data); };
          S.cameraRecorder.onstop = () => {
            S.cameraRecording = false;
            if (status) status.textContent = 'Recording complete. Process frames.';
            setBtn(recordBtn, false);
            if (recordLeft) recordLeft.textContent = '0s';
            if (recordFill) recordFill.style.width = '100%';
          };
          try {
            S.cameraRecorder.start(250);
          } catch (_) {
            S.cameraRecorder.start();
          }
          if (status) status.textContent = 'Recording slow pan...';
          setBtn(recordBtn, true, 'Recording...');
          let left = 10;
          if (recordLeft) recordLeft.textContent = left + 's';
          if (recordFill) recordFill.style.width = '0%';
          if (S.cameraRecordIntv) clearInterval(S.cameraRecordIntv);
          S.cameraRecordIntv = setInterval(() => {
            left -= 1;
            if (recordLeft) recordLeft.textContent = Math.max(0, left) + 's';
            if (recordFill) recordFill.style.width = (100 - (Math.max(0, left) / 10) * 100) + '%';
            if (left <= 0) {
              clearInterval(S.cameraRecordIntv);
              S.cameraRecordIntv = null;
              try {
                if (S.cameraRecorder && S.cameraRecorder.state === 'recording' && typeof S.cameraRecorder.requestData === 'function') {
                  S.cameraRecorder.requestData();
                }
                if (S.cameraRecorder && S.cameraRecorder.state === 'recording') S.cameraRecorder.stop();
              } catch (_) {}
            }
          }, 1000);
        };
      }
      if (processBtn) {
        processBtn.onclick = async () => {
          clearError();
          if (!S.cameraChunks.length) return showError('Record a 10-second pan first.');
          const status = el('cam-status');
          const txt = el('cam-ocr-text');
          setBtn(processBtn, true, 'Processing...');
          try {
            if (status) status.textContent = 'Extracting frames...';
            const blob = new Blob(S.cameraChunks, { type: (S.cameraRecorder && S.cameraRecorder.mimeType) || 'video/webm' });
            if (!blob || blob.size < 2000) {
              throw new Error('Recording file is empty or too small. Try again, or use Chrome on Android if Safari fails.');
            }
            const frames = await extractFramesFromVideoBlob(blob, 10);
            const frameReadings = [];
            for (let i = 0; i < frames.length; i++) {
              if (status) status.textContent = 'Reading frame ' + (i + 1) + '/10...';
              const cards = await callClaudeFrameReader(frames[i]);
              frameReadings.push(cards);

            const agg = aggregateFrameReadings(frameReadings);
            S.cameraReview = agg;
            S.cameraParsedCodes = agg.order.filter(Boolean);
            recomputeCameraFlags();
            renderDetectedCardChips(S.cameraReview.order.filter(Boolean));
            renderCameraReview();
            setText('cam-count', String(S.cameraReview.order.filter(Boolean).length) + '/52');
            if (txt) txt.value = cameraReviewCsv(S.cameraReview.order);
            const totalTok = frameReadings.reduce((n, row) => n + row.length, 0);
            if (status && totalTok === 0) {
              status.textContent = 'AI returned no readable cards. Check lighting, alignment in the guide strip, and that /api/claude-cards works on your host.';
            }
          } catch (err) {
            showError(err.message || 'Processing failed.');

            setBtn(processBtn, false);

        };
      }
      const review = el('cam-review');

    function viewVoice() {
      const parsed = S.voice.parsed;
      return '<div class="logo">HIDE & SEEK</div><div class="panel stack"><h2>Voice Mode</h2><p class="muted">Set your own trigger phrases. Listening auto-stops when end trigger is heard.</p><div class="voice-state"><strong>Status:</strong> <span class="' + (S.voice.listening ? 'mic-live' : '') + '">' + S.voice.status + '</span></div><div><label>Start Trigger</label><input id="voice-start-trigger" type="text" value="' + (S.voice.startTrigger || 'okay') + '"></div><div><label>End Trigger</label><input id="voice-end-trigger" type="text" value="' + (S.voice.endTrigger || 'amazing') + '"></div>' + (parsed ? voiceResultMarkup(S.voice.result) : '') + '<div class="btn-row"><button id="voice-start" class="btn-primary">Start Listening</button></div><button id="voice-back" class="btn-outline btn-full">Back Home</button></div><div id="error-box" class="error"></div>';
    }
    function bindVoice() {
      el('voice-back').onclick = () => go('home');
      el('voice-start').onclick = () => {
        clearError();
        S.voice.startTrigger = (el('voice-start-trigger').value || 'okay').trim().toLowerCase();
        S.voice.endTrigger = (el('voice-end-trigger').value || 'amazing').trim().toLowerCase();
        if (!S.voice.startTrigger || !S.voice.endTrigger) {
          showError('Please provide both start and end trigger phrases.');
          return;
        }
        S.voice.transcript = '';
        S.voice.parsed = null;
        S.voice.result = null;
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) { showError('Speech recognition is not supported in this browser.'); return; }
        stopVoice();
        const rec = new SR();
        rec.lang = 'en-US';
        rec.continuous = true;
        rec.interimResults = true;
        S.voice.rec = rec;
        S.voice.listening = true;
        S.voice.status = 'Mic active and listening...';
        rec.onresult = (event) => {
          let full = '';
          for (let i = 0; i < event.results.length; i++) full += event.results[i][0].transcript + ' ';
          S.voice.transcript = full.trim();
          const heardEndTrigger = S.voice.transcript.toLowerCase().includes(S.voice.endTrigger);
          if (!heardEndTrigger) {
            S.voice.status = 'Mic active and listening...';
            render();
            return;
          }
          S.voice.status = 'End trigger heard. Processing...';
          const parsed = parseVoiceCards(S.voice.transcript, S.voice.startTrigger, S.voice.endTrigger);
          stopVoice();
          if (!parsed.error) {
            S.voice.status = 'Transmission captured.';
            S.voice.parsed = parsed;
            const d = calcDiff(parsed.seeker.suit, parsed.seeker.value, parsed.hider.suit, parsed.hider.value);
            S.voice.result = { diff: d, parsed: parsed };
          } else {
            S.voice.status = parsed.error;
          }
          render();
        };
        rec.onerror = () => { S.voice.status = 'Voice error'; S.voice.listening = false; render(); };
        rec.onend = () => { S.voice.listening = false; if (!S.voice.parsed) S.voice.status = 'Listening ended'; render(); };
        rec.start();
        render();
      };
    }

    function viewSettings() {
      const stackOptions = [
        ['stebbins', 'Si Stebbins'],
        ['ndo', 'New Deck Order'],
        ['eight_kings', 'Eight Kings'],
        ['mnemonica', 'Mnemonica'],
        ['aronson', 'Aronson'],
        ['redford', 'Redford'],
        ['custom', 'Custom']
      ].map((it) => '<option value="' + it[0] + '"' + (S.stackType === it[0] ? ' selected' : '') + '>' + it[1] + '</option>').join('');
      const stebbinsCardBlock = '<div class="delay-wrap"><div class="delay-row"><span>Stebbins Position 1 Card</span><strong>' + cardLabel(S.stebbinsStartSuit, S.stebbinsStartValue) + '</strong></div><div class="btn-row"><select id="settings-stebbins-value" style="flex:1;min-height:44px;border-radius:10px;background:#0a0a0a;color:#fff;border:1px solid var(--border-mid);font-size:16px;">' + VAL_SYMS.map((v, i) => '<option value="' + i + '"' + (S.stebbinsStartValue === i ? ' selected' : '') + '>' + v + '</option>').join('') + '</select><select id="settings-stebbins-suit" style="flex:1;min-height:44px;border-radius:10px;background:#0a0a0a;color:#fff;border:1px solid var(--border-mid);font-size:16px;">' + SUIT_NAMES.map((n, i) => '<option value="' + i + '"' + (S.stebbinsStartSuit === i ? ' selected' : '') + '>' + n + '</option>').join('') + '</select></div></div>';
      const customBlock = '<div class="delay-wrap"><div class="delay-row"><span>Custom Stack</span><strong id="settings-custom-count">' + String(S.customStackCodes.length) + '/52</strong></div><button id="settings-camera-scan" class="btn-outline btn-full">Camera Input</button><textarea id="settings-custom-stack" style="width:100%;min-height:90px;margin-top:10px;border-radius:10px;background:#0a0a0a;color:#fff;border:1px solid var(--border-mid);font-size:14px;padding:10px;">' + (S.customStackCodes || []).join(' ') + '</textarea><div class="tiny">Paste or scan card codes in order (example: AC 4H 7S ...)</div></div>';
      return '<div class="logo">HIDE & SEEK</div><div class="panel stack"><h2>Settings</h2><p>Email: ' + (S.email || '') + '</p><p>Code: <strong>' + (S.publicCode || 'N/A') + '</strong></p><div><label>Card Stack</label><select id="settings-stack-type" style="width:100%;min-height:44px;border-radius:10px;background:#0a0a0a;color:#fff;border:1px solid var(--border-mid);font-size:16px;">' + stackOptions + '</select></div><div id="settings-stebbins-wrap"' + (S.stackType === 'stebbins' ? '' : ' style="display:none;"') + '>' + stebbinsCardBlock + '</div><div id="settings-custom-wrap"' + (S.stackType === 'custom' ? '' : ' style="display:none;"') + '>' + customBlock + '</div><div class="active-toggle"><span class="active-label">Short Deal</span><button id="settings-short-deal" class="switch ' + (S.shortDeal ? 'on' : 'off') + '" aria-label="toggle short deal"></button><div class="toggle-state ' + (S.shortDeal ? 'on' : '') + '">' + (S.shortDeal ? 'ON' : 'OFF') + '</div></div><div class="active-toggle"><span class="active-label">Static Stack</span><button id="settings-static-stack" class="switch ' + (S.staticStack ? 'on' : 'off') + '" aria-label="toggle static stack"></button><div class="toggle-state ' + (S.staticStack ? 'on' : '') + '">' + (S.staticStack ? 'ON' : 'OFF') + '</div></div><div><label>Start Trigger</label><input id="settings-start-trigger" type="text" value="' + (S.voice.startTrigger || 'okay') + '"></div><div><label>End Trigger</label><input id="settings-end-trigger" type="text" value="' + (S.voice.endTrigger || 'amazing') + '"></div><div class="delay-wrap"><div class="delay-row"><span>Microphone Delay</span><strong id="delay-value">' + formatDelayLabel(S.soloDelaySec) + '</strong></div><div id="delay-picker" class="delay-picker">' + renderDelayPickerOptions() + '</div></div><button id="settings-back" class="btn-primary btn-full">Back</button><div class="spacer"></div><button id="logout-btn" class="btn-danger btn-full">Logout</button></div><div id="error-box" class="error"></div>';
    }
    function bindSettings() {
      el('settings-back').onclick = () => {
        const st = (el('settings-start-trigger').value || '').trim().toLowerCase();
        const et = (el('settings-end-trigger').value || '').trim().toLowerCase();
        const stackType = el('settings-stack-type').value || 'stebbins';
        const shortDeal = !!(el('settings-short-deal') && el('settings-short-deal').classList.contains('on'));
        const staticStack = !!(el('settings-static-stack') && el('settings-static-stack').classList.contains('on'));
        const stebbinsSuit = Number(el('settings-stebbins-suit') ? el('settings-stebbins-suit').value : S.stebbinsStartSuit);
        const stebbinsValue = Number(el('settings-stebbins-value') ? el('settings-stebbins-value').value : S.stebbinsStartValue);
        if (!st || !et) {
          showError('Start and end triggers are required.');
          return;
        }
        if (!STACK_TYPES.includes(stackType)) {
          showError('Invalid stack selection.');
          return;
        }
        S.voice.startTrigger = st;
        S.voice.endTrigger = et;
        S.stackType = stackType;
        S.shortDeal = shortDeal;
        S.staticStack = staticStack;
        S.stebbinsStartSuit = Number.isInteger(stebbinsSuit) ? stebbinsSuit : 2;
        S.stebbinsStartValue = Number.isInteger(stebbinsValue) ? stebbinsValue : 0;
        if (stackType === 'custom') {
          const rawCodes = (el('settings-custom-stack') ? el('settings-custom-stack').value : '').trim();
          const parsed = parseCardCodesFromText(rawCodes);
          const unique = Array.from(new Set(parsed));
          if (unique.length !== 52) {
            showError('Custom stack needs exactly 52 valid unique cards.');
            return;
          }
          S.customStackCodes = unique;
        }
        saveProfileStackSettings().then(() => {
          go('home');
        }).catch((err) => showError(err.message || 'Could not save settings.'));
      };
      const stackSel = el('settings-stack-type');
      if (stackSel) {
        stackSel.onchange = () => {
          const wrap = el('settings-stebbins-wrap');
          const customWrap = el('settings-custom-wrap');
          if (!wrap) return;
          wrap.style.display = stackSel.value === 'stebbins' ? '' : 'none';
          if (customWrap) customWrap.style.display = stackSel.value === 'custom' ? '' : 'none';
        };
      }
      const camBtn = el('settings-camera-scan');
      if (camBtn) camBtn.onclick = () => go('camera-stack');
      const shortDealBtn = el('settings-short-deal');
      if (shortDealBtn) {
        shortDealBtn.onclick = () => {
          const next = !shortDealBtn.classList.contains('on');
          shortDealBtn.classList.toggle('on', next);
          shortDealBtn.classList.toggle('off', !next);
          const state = shortDealBtn.parentElement ? shortDealBtn.parentElement.querySelector('.toggle-state') : null;
          if (state) {
            state.classList.toggle('on', next);
            state.textContent = next ? 'ON' : 'OFF';
          }
        };
      }
      const staticStackBtn = el('settings-static-stack');
      if (staticStackBtn) {
        staticStackBtn.onclick = () => {
          const next = !staticStackBtn.classList.contains('on');
          staticStackBtn.classList.toggle('on', next);
          staticStackBtn.classList.toggle('off', !next);
          const state = staticStackBtn.parentElement ? staticStackBtn.parentElement.querySelector('.toggle-state') : null;
          if (state) {
            state.classList.toggle('on', next);
            state.textContent = next ? 'ON' : 'OFF';
          }
        };
      }
      initDelayPicker();
      el('logout-btn').onclick = async () => {
        const ok = window.confirm('Lock app now?');
        if (!ok) return;
        clearSessionWatchers();
        stopVoice();
        S.pinUnlocked = false;
        S.session = null;
        go('login-pin');
      };
    }

    async function render() {
      const app = el('app'); if (!app) return;
      if (S.view === 'welcome') { app.innerHTML = viewWelcome(); bindWelcome(); return; }
      if (S.view === 'login-pin') { app.innerHTML = viewLoginPin(); bindLoginPin(); return; }
      if (S.view === 'reg-code') { app.innerHTML = viewRegCode(); bindRegCode(); return; }
      if (S.view === 'reg-email') { app.innerHTML = viewRegEmail(); bindRegEmail(); return; }
      if (S.view === 'home') { app.innerHTML = viewHome(); bindHome(); return; }
      if (S.view === 'accomplice-send') { app.innerHTML = viewAccompliceSend(); await bindAccompliceSend(); return; }
      if (S.view === 'perform') { app.innerHTML = viewPerform(); bindPerform(); return; }
      if (S.view === 'solo-perform') { app.innerHTML = viewSoloPerform(); bindSoloPerform(); return; }
      if (S.view === 'self-keypad') { app.innerHTML = viewSelfKeypad(); bindSelfKeypad(); return; }
      if (S.view === 'voice') { app.innerHTML = viewVoice(); bindVoice(); return; }
      if (S.view === 'camera-stack') { app.innerHTML = viewCameraStack(); await bindCameraStack(); return; }
      if (S.view === 'settings') { app.innerHTML = viewSettings(); bindSettings(); }
    }
    async function init() {
      if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(() => {});
      let session = await getSession();
      if (!session || !session.user) {
        const anon = await sb.auth.signInAnonymously();
        if (anon.error) {
          S.view = 'welcome';
          render();
          showError('Anonymous auth failed. Enable Anonymous provider in Supabase Auth settings.');
          return;
        }
        session = anon.data.session || null;
      }
      if (session && session.user) {
        S.user = session.user;
        try { await loadProfile(); } catch (_) {}
        const lock = lockedEmail();
        if (S.pinHash && S.pinSalt && lock && S.email && lock === S.email.toLowerCase()) {
          S.view = 'login-pin';
        } else if (S.email) {
          S.view = 'reg-code';
        } else {
          S.view = 'welcome';
        }
      } else {
        S.view = 'welcome';
      }
      render();
    }
    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
